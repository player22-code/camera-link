<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Galeria</title>
</head>
<body>

<h2>Digite a senha</h2>
<input type="password" id="senha">
<button onclick="verificar()">Entrar</button>

<div id="galeria" style="display:none;"></div>

<script>
const BIN_ID = "69d65f7036566621a88f23ad";
const API_KEY = "$2a$10$TGWviiTU6WDwbnoyxXdO1OB.zfLXw2aPhoG4SChWWQYA757BpZBqO";
const SENHA = "050108";

function verificar() {
  const senha = document.getElementById("senha").value;

  if (senha === SENHA) {
    document.getElementById("galeria").style.display = "block";
    carregarImagens();
  } else {
    alert("Senha errada");
  }
}

async function carregarImagens() {
  let res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
    headers: {
      "X-Master-Key": API_KEY
    }
  });

  let data = await res.json();
  let imagens = data.record || [];

  const galeria = document.getElementById("galeria");
  galeria.innerHTML = "";

  imagens.forEach(img => {
    let image = document.createElement("img");
    image.src = img;
    image.style.width = "200px";
    image.style.margin = "10px";
    galeria.appendChild(image);
  });
}
</script>

</body>
</html>
